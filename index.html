<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masaya Tezuka — Future Designer & Design Strategist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0a0a0a; --paper: #f5f3ee; --paper-2: #ebe8e0;
    --muted: #6b6b6b; --accent: #ff3b1f; --line: rgba(10,10,10,0.12);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.4; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; color: #fff; }
  nav .logo { font-weight: 800; font-size: 0.95rem; letter-spacing: -0.01em; text-decoration: none; color: inherit; }
  nav .logo span { color: var(--accent); }
  nav ul { display: flex; gap: 2rem; list-style: none; }
  nav a { color: inherit; text-decoration: none; font-size: 0.85rem; font-weight: 500; position: relative; padding: 0.3rem 0; }
  nav a:not(.cta)::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: currentColor; transition: width 0.3s ease; }
  nav a:not(.cta):hover::after { width: 100%; }
  nav .cta { border: 1px solid currentColor; padding: 0.5rem 1rem; border-radius: 100px; font-size: 0.78rem; }

  /* HERO */
  .hero { min-height: 100vh; padding: 8rem 2.5rem 4rem; display: flex; flex-direction: column; justify-content: space-between; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; flex-wrap: wrap; }
  .hero-meta { display: flex; gap: 3rem; flex-wrap: wrap; }
  .hero-meta div { max-width: 260px; }
  .hero-meta .label { color: var(--muted); margin-bottom: 0.5rem; }
  .hero-meta p { font-size: 0.95rem; }
